<style>

    padding: 0;
    max-width: 520px;
    width: 90%;
    box-shadow: 6px 6px 0 #1a2e1a, inset 0 0 0 2px #3d6e3d;
    image-rendering: pixelated;
    position: relative;
  }

  .dialog-title-bar {
    background: #4a8a4a;
    border-bottom: 4px solid #7ab87a;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dialog-title-bar .pixel-icon {
    width: 16px; height: 16px;
    display: inline-block;
  }

  .dialog-title-bar span {
    color: #e8f5e8;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #1a2e1a;
  }

  .dialog-body {
    padding: 20px 20px 16px;
    color: #d4f0d4;
    font-size: 15px;
    line-height: 1.9;
    min-height: 80px;
    text-shadow: 1px 1px 0 #1a2e1a;
  }

  .dialog-body .highlight {
    color: #ffd97a;
    font-weight: bold;
  }

  .dialog-body .rule-title {
    display: inline-block;
    background: #4a7a4a;
    border: 2px solid #7ab87a;
    color: #ffd97a;
    padding: 2px 10px;
    margin-bottom: 6px;

  }

  .dialog-footer {
    padding: 8px 16px 14px;

    justify-content: flex-end;
  }

  .pixel-btn {
    background: #4a8a4a;
    border: 3px solid #7ab87a;

    60% { transform: rotateY(8deg) scale(1.02); opacity: 1; }

  }

</style>

<body>

<!-- OVERLAY FOR DIALOGS -->
<div id="overlay">
  <div class="dialog-box">

      <span id="dialog-title">序章</span>
    </div>

</div>

<!-- RESULT OVERLAY -->
<div id="result-overlay">
  <div class="result-box" id="result-box">

    </div>

</div>

<!-- GAME UI -->
<div id="game-area" style="opacity:0; transition: opacity 0.6s;">
  <div id="status-bar">
    <div class="player-info">
      <span class="player-label">墨翟</span>
      <div class="wall-count" id="mozi-walls"></div>
    </div>
    <div class="turn-indicator" id="turn-indicator">公输班先行</div>

      <span class="player-label">公输班</span>
    </div>
  </div>

  <div id="mode-bar">
    <button class="mode-btn selected" id="btn-move" onclick="setMode('move')">移动棋子 ✦</button>
    <button class="mode-btn" id="btn-wall" onclick="setMode('wall')">放置墨线 ━</button>
  </div>

  <div id="board-wrap">
    <canvas id="board-canvas" id="board-canvas"></canvas>
  </div>
</div>

<script>
// =====================================================================
// CONSTANTS & STATE
// =====================================================================
const COLS = 9, ROWS = 9;
const CELL = 52;          // px per cell
const WALL_T = 8;         // wall thickness
const GAP = 6;            // gap between cells
const STEP = CELL + GAP;  // cell stride
const MARGIN = 28;        // canvas margin
const CANVAS_W = MARGIN * 2 + STEP * 9 - GAP;
const CANVAS_H = CANVAS_W;

// Walls stored as sets. Horizontal wall at (r,c) blocks passage between row r and r+1,
// spanning columns c and c+1. Vertical wall at (r,c) blocks passage between col c and c+1,
// spanning rows r and r+1.
// Key format: "h_r_c" or "v_r_c"
let hWalls = new Set(); // horizontal walls (block up/down movement)
let vWalls = new Set(); // vertical walls (block left/right movement)

let moziPos  = { r: 8, c: 4 }; // player, starts bottom center, goal r=0
let lubanPos = { r: 0, c: 4 }; // ai,     starts top center,    goal r=8

let moziWalls  = 10;
let lubanWalls = 10;

let currentTurn = 'luban'; // luban goes first
let playerMode = 'move';   // 'move' or 'wall'
let wallPreview = null;     // { type:'h'|'v', r, c, valid }
let gameOver = false;
let dialogStep = 0;
let boardVisible = false;

const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// =====================================================================
// DIALOG CONTENT
// =====================================================================
const dialogs = [
  {
    title: '序章 · 一',
    html: `你是<span class="highlight">墨翟</span>。<br>最近，你的邻居公输班造了个鸟玩具，天天在屋顶上飞，十分吵闹，害你看不进书。`
  },
  {
    title: '序章 · 二',
    html: `你认为公输班<span class="highlight">玩物丧志</span>，决定手动帮他防沉迷，把鸟削了。`
  },
  {
    title: '序章 · 三',
    html: `公输班则认为你看书看坏了脑子，决定帮你把<span class="highlight">书房一把火烧了</span>。`
  },
  {
    title: '序章 · 四',
    html: `今晚，你俩在<span class="highlight">翻墙时撞了个正着</span>，两处阴谋变成了一处战场——`
  },
  // step 4 = show board
  {
    title: '规则 · 棋盘',
    html: `你们的院子是规整的 <span class="highlight">9×9 方格</span>（理工宿舍都是这样的）。`
  },
  {
    title: '规则 · 道具',
    html: `你有<span class="highlight">十根墨线</span>，公输班有<span class="highlight">十架云梯</span>。<br>此刻，它们不再是你们的办公用品，而是用来<span class="highlight">挡路的墙</span>。`
  },
  {
    title: '规则 · 行动',
    html: `你们<span class="highlight">轮流行动</span>，轮到你时，要么<span class="highlight">移动一格</span>（上下左右），要么<span class="highlight">放置一条墨线</span>（绊倒公输班用，他别想跨过去）。`
  },
  {
    title: '规则 · 胜利',
    html: `<span class="rule-title">「我全对，听我的」</span><br>谁先抵达<span class="highlight">对方的底线</span>谁就赢。`
  },
  {
    title: '规则 · 禁忌',
    html: `<span class="rule-title">「比赛第一，邻居第二」</span><br>不能把对方的路<span class="highlight">完全堵死</span>，必须至少留一条活路。`
  },
  {
    title: '开始！',
    html: `现在，请守护你的书房，抓住邻居的鸟，<span class="highlight">证明你才是正确的！</span>`,
    lastBtn: '出发！▶'
  }
];

let currentDialogIdx = 0;

function showDialog(idx) {
  const d = dialogs[idx];
  document.getElementById('dialog-title').textContent = d.title;
  document.getElementById('dialog-body').innerHTML = d.html;
  const btn = document.getElementById('dialog-next-btn');
  btn.textContent = d.lastBtn || '下一步 ▶';
  document.getElementById('overlay').classList.remove('hidden');
}

function nextDialog() {
  currentDialogIdx++;
  // After dialog 3 (index 3), hide overlay and show board
  if (currentDialogIdx === 4) {
    document.getElementById('overlay').classList.add('hidden');
    showBoard();
    // After 1.5s, show rules dialogs
    setTimeout(() => {
      showDialog(4);
    }, 1600);
    return;
  }
  if (currentDialogIdx >= dialogs.length) {
    // Start game
    document.getElementById('overlay').classList.add('hidden');
    startGame();
    return;
  }
  showDialog(currentDialogIdx);
}

function showBoard() {
  const ga = document.getElementById('game-area');
  ga.style.opacity = '1';
  const wrap = document.getElementById('board-wrap');
  wrap.classList.add('board-enter');
  boardVisible = true;
  drawBoard();
  updateUI();
}

// =====================================================================
// GAME INIT
// =====================================================================
function startGame() {
  gameOver = false;
  document.getElementById('result-overlay').classList.remove('show');
  drawBoard();
  updateUI();
  // AI goes first
  if (currentTurn === 'luban') {
    setTimeout(doAITurn, 700);
  }
}

function restartGame() {
  hWalls = new Set();
  vWalls = new Set();
  moziWallSet.clear();
  lubanWallSet.clear();
  moziPos  = { r: 8, c: 4 };
  lubanPos = { r: 0, c: 4 };
  moziWalls  = 10;
  lubanWalls = 10;
  currentTurn = 'luban';
  playerMode = 'move';
  wallPreview = null;
  gameOver = false;
  setMode('move');
  document.getElementById('result-overlay').classList.remove('show');
  drawBoard();
  updateUI();
  setTimeout(doAITurn, 700);
}

// =====================================================================
// COORDINATE HELPERS
// =====================================================================
function cellTopLeft(r, c) {
  return {
    x: MARGIN + c * STEP,
    y: MARGIN + r * STEP
  };
}

function posFromPixel(px, py) {
  // Returns {r, c} of cell, or null
  const ox = px - MARGIN;
  const oy = py - MARGIN;
  const c = Math.floor(ox / STEP);
  const r = Math.floor(oy / STEP);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  // Check we're inside cell not in gap
  const lx = ox - c * STEP;
  const ly = oy - r * STEP;
  if (lx > CELL || ly > CELL) return null; // in gap
  return { r, c };
}

// For wall placement: figure out which wall gap we're near
function wallFromPixel(px, py) {
  const ox = px - MARGIN;
  const oy = py - MARGIN;
  // Determine if near horizontal gap (between rows) or vertical gap (between cols)
  // Each grid unit is STEP = CELL+GAP wide
  // A horizontal wall sits in the GAP below row r, spanning cols c and c+1
  // Let's find nearest wall slot

  // Try horizontal wall: y is in gap between row r and r+1
  // Gap region y: MARGIN + r*STEP + CELL  to  MARGIN + r*STEP + CELL + GAP
  // Wall spans c*STEP to (c+2)*STEP horizontally (two cells)
  
  let bestWall = null;
  let bestDist = 20;

  // Check horizontal walls
  for (let r = 0; r < ROWS - 1; r++) {
    const gy = MARGIN + r * STEP + CELL + GAP / 2;
    for (let c = 0; c < COLS - 1; c++) {
      const wx = MARGIN + c * STEP + STEP; // center of wall spanning c and c+1
      const dist = Math.hypot(px - wx, py - gy);
      if (dist < bestDist) { bestDist = dist; bestWall = { type: 'h', r, c }; }
    }
  }
  // Check vertical walls
  for (let c = 0; c < COLS - 1; c++) {
    const gx = MARGIN + c * STEP + CELL + GAP / 2;
    for (let r = 0; r < ROWS - 1; r++) {
      const wy = MARGIN + r * STEP + STEP;
      const dist = Math.hypot(px - gx, py - wy);
      if (dist < bestDist) { bestDist = dist; bestWall = { type: 'v', r, c }; }
    }
  }
  return bestWall;
}

// =====================================================================
// MOVEMENT & WALL VALIDATION
// =====================================================================
function canMove(from, dr, dc, hw, vw) {
  const nr = from.r + dr;
  const nc = from.c + dc;
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return false;
  // Wall blocking rules:
  // Horizontal wall h_r_c blocks movement between row r and r+1 at BOTH column c and column c+1.
  //   So moving down from (r,c): blocked if hw has h_r_c OR h_r_(c-1)
  //   Moving up from (r,c) to (r-1,c): blocked if hw has h_(r-1)_c OR h_(r-1)_(c-1)
  // Vertical wall v_r_c blocks movement between col c and c+1 at BOTH row r and row r+1.
  //   Moving right from (r,c): blocked if vw has v_r_c OR v_(r-1)_c
  //   Moving left from (r,c) to (r,c-1): blocked if vw has v_r_(c-1) OR v_(r-1)_(c-1)
  if (dr === 1) {
    // Moving down: wall h_from.r_from.c or h_from.r_(from.c-1)
    if (hw.has(`h_${from.r}_${from.c}`)) return false;
    if (from.c > 0 && hw.has(`h_${from.r}_${from.c-1}`)) return false;
  }
  if (dr === -1) {
    // Moving up: wall h_(from.r-1)_from.c or h_(from.r-1)_(from.c-1)
    if (hw.has(`h_${from.r-1}_${from.c}`)) return false;
    if (from.c > 0 && hw.has(`h_${from.r-1}_${from.c-1}`)) return false;
  }
  if (dc === 1) {
    // Moving right: wall v_from.r_from.c or v_(from.r-1)_from.c
    if (vw.has(`v_${from.r}_${from.c}`)) return false;
    if (from.r > 0 && vw.has(`v_${from.r-1}_${from.c}`)) return false;
  }
  if (dc === -1) {
    // Moving left: wall v_from.r_(from.c-1) or v_(from.r-1)_(from.c-1)
    if (vw.has(`v_${from.r}_${from.c-1}`)) return false;
    if (from.r > 0 && vw.has(`v_${from.r-1}_${from.c-1}`)) return false;
  }
  return true;
}

function getNeighbors(pos, hw, vw) {
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  const result = [];
  for (const [dr,dc] of dirs) {
    if (canMove(pos, dr, dc, hw, vw)) result.push({ r: pos.r+dr, c: pos.c+dc });
  }
  return result;
}

// BFS shortest path length from pos to target row (goalRow)
function bfsDistance(pos, goalRow, hw, vw, blocked) {
  const visited = Array.from({length:ROWS}, ()=>new Array(COLS).fill(false));
  const queue = [{ r: pos.r, c: pos.c, d: 0 }];
  visited[pos.r][pos.c] = true;
  while (queue.length) {
    const { r, c, d } = queue.shift();
    if (r === goalRow) return d;
    for (const nb of getNeighbors({r,c}, hw, vw)) {
      if (visited[nb.r][nb.c]) continue;
      if (blocked && nb.r === blocked.r && nb.c === blocked.c) continue;
      visited[nb.r][nb.c] = true;
      queue.push({ r:nb.r, c:nb.c, d:d+1 });
    }
  }
  return Infinity;
}

// BFS path as array
function bfsPath(pos, goalRow, hw, vw, blocked) {
  const visited = Array.from({length:ROWS}, ()=>new Array(COLS).fill(false));
  const prev = Array.from({length:ROWS}, ()=>new Array(COLS).fill(null));
  const queue = [{ r: pos.r, c: pos.c }];
  visited[pos.r][pos.c] = true;
  let found = null;
  while (queue.length && !found) {
    const cur = queue.shift();
    if (cur.r === goalRow) { found = cur; break; }
    for (const nb of getNeighbors(cur, hw, vw)) {
      if (visited[nb.r][nb.c]) continue;
      if (blocked && nb.r === blocked.r && nb.c === blocked.c) continue;
      visited[nb.r][nb.c] = true;
      prev[nb.r][nb.c] = cur;
      queue.push(nb);
    }
  }
  if (!found) return null;
  const path = [];
  let cur = found;
  while (cur) { path.unshift(cur); cur = prev[cur.r][cur.c]; }
  return path;
}

function wallKey(type, r, c) { return `${type}_${r}_${c}`; }

function wallConflicts(type, r, c, hw, vw) {
  // Horizontal wall h_r_c spans 2 segments: (r,c) and (r,c+1) vertically crossing
  // Vertical wall v_r_c spans 2 segments: (r,c) and (r+1,c) horizontally crossing
  if (type === 'h') {
    if (hw.has(wallKey('h', r, c)))   return true; // exact same
    if (hw.has(wallKey('h', r, c-1))) return true; // overlaps left
    if (hw.has(wallKey('h', r, c+1))) return true; // overlaps right
    if (vw.has(wallKey('v', r, c)))   return true; // crosses at center post
  } else {
    if (vw.has(wallKey('v', r, c)))   return true;
    if (vw.has(wallKey('v', r-1, c))) return true;
    if (vw.has(wallKey('v', r+1, c))) return true;
    if (hw.has(wallKey('h', r, c)))   return true; // crosses at center post
  }
  return false;
}

function isWallValid(type, r, c) {
  if (type === 'h') {
    if (r < 0 || r >= ROWS-1 || c < 0 || c >= COLS-1) return false;
  } else {
    if (r < 0 || r >= ROWS-1 || c < 0 || c >= COLS-1) return false;
  }
  if (wallConflicts(type, r, c, hWalls, vWalls)) return false;
  // Test path not blocked
  const testH = new Set(hWalls);
  const testV = new Set(vWalls);
  if (type === 'h') testH.add(wallKey('h',r,c)); else testV.add(wallKey('v',r,c));
  const md = bfsDistance(moziPos, 0, testH, testV, lubanPos);
  const ld = bfsDistance(lubanPos, 8, testH, testV, moziPos);
  return md < Infinity && ld < Infinity;
}

function drawMoziWall(x1, y1, x2, y2) {

  const dx = x2-x1, dy = y2-y1;

  ctx.save();
  ctx.translate(x1,y1);
  ctx.rotate(Math.atan2(dy,dx));
  // Rope segments
  for (let i=0; i<len; i+=8) {
    const t = i/len;
    ctx.fillStyle = i%16<8 ? '#1a1a1a' : '#2a2a2a';
    ctx.fillRect(i, -4, 8, 8);
  }
  // Knot ends
  ctx.fillStyle = '#111';
  ctx.fillRect(-2, -5, 6, 10);
  ctx.fillRect(len-4, -5, 6, 10);
  ctx.restore();
}

const moziWallSet = new Set();

function setupScene() {

// Expanded canvas to include top and bottom decorations
function resizeForScene() {
  const PAD_TOP = 90;

function drawScene() {
  const PAD_TOP = +canvas.dataset.padTop || 0;
  
  // Background behind decorations
  ctx.fillStyle = '#1a2e0a';
  ctx.fillRect(0, 0, CANVAS_W, canvas.height);

  // Top area - Luban's domain
  ctx.fillStyle = '#0e1e0e';

  skyGrad.addColorStop(0,'#0a1a2a');
  skyGrad.addColorStop(1,'#1a2e0a');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,CANVAS_W,PAD_TOP);
  // Stars
  ctx.fillStyle = '#ffd97a';
  const stars = [[20,10],[80,15],[150,8],[300,12],[420,6],[500,14],[560,9]];
  for(const [sx,sy] of stars){ ctx.fillRect(sx,sy,2,2); }
  // Moon
  ctx.fillStyle = '#e8e0c0';
  ctx.fillRect(CANVAS_W-50, 8, 16, 16);
  ctx.fillStyle = '#0a1a2a';
  ctx.fillRect(CANVAS_W-47, 8, 14, 14);

  // Draw bird in top center
  drawPixelBird(CANVAS_W/2, PAD_TOP/2 + 10);

  // Luban goal label

  // Board area offset
  ctx.save();
  ctx.translate(0, PAD_TOP);
  drawBoardContent();
  ctx.restore();

  // Bottom area - Mozi's domain
  const botY = PAD_TOP + CANVAS_H;
  ctx.fillStyle = '#0e1e0e';
  ctx.fillRect(0, botY, CANVAS_W, canvas.height - botY);
  const groundGrad = ctx.createLinearGradient(0,botY,0,canvas.height);
  groundGrad.addColorStop(0,'#1a2e0a');
  groundGrad.addColorStop(1,'#0a150a');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0,botY,CANVAS_W,canvas.height-botY);
  // Draw bookroom
  drawPixelBookroom(CANVAS_W/2, botY + 45);

  ctx.fillStyle = '#4ab8f0';
  ctx.font = 'bold 11px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  ctx.fillText('▲ 墨翟的书房 ▲', CANVAS_W/2, botY + 8);

function drawBoardContent() {
  // Draw cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x, y } = cellTopLeft(r, c);
      const dark = (r + c) % 2 === 0;
      drawGrassTile(x, y, CELL, CELL, dark);

      if (!gameOver && currentTurn === 'mozi' && playerMode === 'move') {
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for (const [dr,dc] of dirs) {
          if (moziPos.r+dr===r && moziPos.c+dc===c) {
            if (canMove(moziPos,dr,dc,hWalls,vWalls) && !(lubanPos.r===r&&lubanPos.c===c)) {
              ctx.fillStyle = 'rgba(100,220,100,0.35)';
              ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
            }
          }
        }
      }
    }
  }

  // Goal lines
  for (let c = 0; c < COLS; c++) {
    const { x, y } = cellTopLeft(0, c);
    ctx.fillStyle = 'rgba(200,132,58,0.2)';
    ctx.fillRect(x, y, CELL, CELL);
    ctx.strokeStyle = '#e8883a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
  }
  for (let c = 0; c < COLS; c++) {
    const { x, y } = cellTopLeft(8, c);
    ctx.fillStyle = 'rgba(74,184,240,0.2)';
    ctx.fillRect(x, y, CELL, CELL);
    ctx.strokeStyle = '#4ab8f0';
    ctx.lineWidth = 2;
    ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
  }

  // Wall preview
  if (wallPreview && currentTurn === 'mozi' && playerMode === 'wall') {
    const { type, r, c, valid } = wallPreview;
    ctx.globalAlpha = 0.65;
    drawWallShapeLocal(type, r, c, false, true, valid);
    ctx.globalAlpha = 1.0;
  }

  // Placed walls
  hWalls.forEach(key => {
    const [,rs,cs] = key.split('_');
    drawWallShapeLocal('h', +rs, +cs, true, moziWallSet.has(key), true);
  });
  vWalls.forEach(key => {
    const [,rs,cs] = key.split('_');
    drawWallShapeLocal('v', +rs, +cs, false, moziWallSet.has(key), true);
  });

  // Characters
  const lp = cellTopLeft(lubanPos.r, lubanPos.c);
  drawLuban(lp.x + CELL/2, lp.y + CELL/2);
  const mp = cellTopLeft(moziPos.r, moziPos.c);
  drawMozi(mp.x + CELL/2, mp.y + CELL/2);
}

function drawWallShapeLocal(type, r, c, isPlaced, isMozi, valid) {
  if (type === 'h') {
    const { x: x1, y: y1 } = cellTopLeft(r, c);
    const { x: x2 } = cellTopLeft(r, c+1);
    const wy = y1 + CELL + GAP/2;
    const wx1 = x1;
    const wx2 = x2 + CELL;
    if (!isPlaced) {
      ctx.fillStyle = valid ? 'rgba(80,200,80,0.8)' : 'rgba(220,60,60,0.8)';
      ctx.fillRect(wx1, wy-4, wx2-wx1, 8);
    } else if (isMozi) {
      drawMoziWall(wx1, wy, wx2, wy);
    } else {
      drawLubanWall(wx1, wy, wx2, wy);
    }
  } else {
    const { x: x1, y: y1 } = cellTopLeft(r, c);
    const { y: y2 } = cellTopLeft(r+1, c);
    const wx = x1 + CELL + GAP/2;
    const wy1 = y1;
    const wy2 = y2 + CELL;
    if (!isPlaced) {
      ctx.fillStyle = valid ? 'rgba(80,200,80,0.8)' : 'rgba(220,60,60,0.8)';
      ctx.fillRect(wx-4, wy1, 8, wy2-wy1);
    } else if (isMozi) {
      drawMoziWall(wx, wy1, wx, wy2);
    } else {
      drawLubanWall(wx, wy1, wx, wy2);
    }
  }
}

function drawBoard() {
  ctx.clearRect(0, 0, CANVAS_W, canvas.height);
  drawScene();
}

// =====================================================================
// PLAYER INPUT
// =====================================================================
function canvasClick(e) {
  if (gameOver || currentTurn !== 'mozi') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const PAD_TOP = +canvas.dataset.padTop || 0;
  const py = (e.clientY - rect.top) * scaleY - PAD_TOP;

  if (playerMode === 'move') {
    const cell = posFromPixel(px, py);
    if (!cell) return;
    const dr = cell.r - moziPos.r;
    const dc = cell.c - moziPos.c;
    if (Math.abs(dr)+Math.abs(dc) !== 1) return;
    if (!canMove(moziPos, dr, dc, hWalls, vWalls)) return;
    if (lubanPos.r === cell.r && lubanPos.c === cell.c) return;
    moziPos = cell;
    endPlayerTurn();
  } else {
    // Place wall
    if (!wallPreview || !wallPreview.valid) return;
    const { type, r, c } = wallPreview;
    if (!isWallValid(type, r, c)) return;
    if (type === 'h') hWalls.add(wallKey('h',r,c));
    else vWalls.add(wallKey('v',r,c));
    moziWallSet.add(wallKey(type,r,c));
    moziWalls--;
    wallPreview = null;
    endPlayerTurn();
  }
}

function canvasMouseMove(e) {
  if (gameOver || currentTurn !== 'mozi' || playerMode !== 'wall') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const PAD_TOP = +canvas.dataset.padTop || 0;
  const py = (e.clientY - rect.top) * scaleY - PAD_TOP;

  const wall = wallFromPixel(px, py);
  if (!wall) { wallPreview = null; drawBoard(); return; }

  // Determine orientation by which is closer
  // Recalculate: prefer horizontal if cursor is closer to horizontal gap
  const { r, c } = wall;
  // Try both and pick nearest
  const hy = MARGIN + r * STEP + CELL + GAP/2;
  const hx = MARGIN + c * STEP + STEP;
  const vx = MARGIN + c * STEP + CELL + GAP/2;
  const vy = MARGIN + r * STEP + STEP;
  const dh = Math.hypot(px-hx, py-hy);
  const dv = Math.hypot(px-vx, py-vy);
  const type = dh < dv ? 'h' : 'v';

  const valid = (moziWalls > 0) && isWallValid(type, r, c);
  wallPreview = { type, r, c, valid };
  drawBoard();
}

canvas.addEventListener('click', canvasClick);
canvas.addEventListener('mousemove', canvasMouseMove);
canvas.addEventListener('mouseleave', () => { wallPreview = null; if (!gameOver) drawBoard(); });

// TURN MANAGEMENT
// =====================================================================
function endPlayerTurn() {
  drawBoard();
  updateUI();
  if (checkWin()) return;
  currentTurn = 'luban';
  updateUI();
  setTimeout(doAITurn, 600);
}

function endAITurn() {
  drawBoard();
  updateUI();
  if (checkWin()) return;
  currentTurn = 'mozi';
  updateUI();
  drawBoard();
}

function checkWin() {
  if (moziPos.r === 0) { showResult('win'); gameOver=true; return true; }
  if (lubanPos.r === 8) { showResult('lose'); gameOver=true; return true; }
  // Check draw: both fully blocked
  const moziMoves = [[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>canMove(moziPos,dr,dc,hWalls,vWalls)&&!(lubanPos.r===moziPos.r+dr&&lubanPos.c===moziPos.c+dc));
  const lubanMoves = [[-1,0],[1,0],[0,-1],[0,1]].filter(([dr,dc])=>canMove(lubanPos,dr,dc,hWalls,vWalls)&&!(moziPos.r===lubanPos.r+dr&&moziPos.c===lubanPos.c+dc));
  if (moziMoves.length===0 && lubanMoves.length===0) { showResult('draw'); gameOver=true; return true; }
  return false;
}

    win: `恭喜！你成功俘虏了公输班的木头鸟！在公输班的苦苦哀求下，你放弃了拿它烧柴的打算。作为赎金，公输班不得不帮你抄了一个月的书。美哉，美哉！`,
    lose: `噢不，公输班成功潜入了你的书房，在你珍贵的笔记上画了个大大的👎，旁书"公输班到此一游"。现在，你只好一边忍受木头鸟在你的房顶上嘎嘎大笑，一边重新誊抄你的笔记了……`,
    draw: `你们势均力敌，大战八百回合，墨线和云梯横七竖八地把小小的庭院挤得水泄不通。终于，你们把自己关在了院子里，进退两难。你们面面相觑，饿着肚子等了三天三夜，终于被路过的弟子们捞了出来。`
  };
  const bar = document.getElementById('result-title-bar');
  bar.textContent = titles[type];
  bar.className = 'result-title-bar ' + type;
  document.getElementById('result-body').textContent = bodies[type];
  document.getElementById('result-overlay').classList.add('show');
}

// =====================================================================
// AI (HEURISTIC)
// =====================================================================
function doAITurn() {
  if (gameOver) return;

  const lubanGoal = 8;
  const moziGoal  = 0;

  const ld = bfsDistance(lubanPos, lubanGoal, hWalls, vWalls, moziPos);
  const md = bfsDistance(moziPos,  moziGoal,  hWalls, vWalls, lubanPos);

  // Decision: if mozi is ahead (shorter path) and luban has walls, try to block
  const shouldBlock = (md <= ld + 1) && lubanWalls > 0 && md < Infinity;

  if (shouldBlock) {
    const bestWall = findBestBlockingWall();
    if (bestWall) {
      const { type, r, c } = bestWall;
      if (type === 'h') hWalls.add(wallKey('h',r,c));
      else vWalls.add(wallKey('v',r,c));
      lubanWallSet.add(wallKey(type,r,c));
      lubanWalls--;
      endAITurn();
      return;
    }
  }

  // Move along BFS path
  const path = bfsPath(lubanPos, lubanGoal, hWalls, vWalls, moziPos);
  if (path && path.length > 1) {
    lubanPos = { r: path[1].r, c: path[1].c };
  } else {
    // Fallback: any valid move
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr,dc] of dirs) {
      if (canMove(lubanPos,dr,dc,hWalls,vWalls)) {
        const nr = lubanPos.r+dr, nc = lubanPos.c+dc;
        if (!(moziPos.r===nr&&moziPos.c===nc)) { lubanPos={r:nr,c:nc}; break; }
      }
    }
  }
  endAITurn();
}

function findBestBlockingWall() {
  // Find wall placement that maximizes (moziNewDist - moziOldDist) while keeping luban path valid
  const moziGoal = 0;
  const lubanGoal = 8;
  const moziBaseDist = bfsDistance(moziPos, moziGoal, hWalls, vWalls, lubanPos);

  let best = null;
  let bestGain = 0;

  // Get mozi's current path to prioritize walls along it
  const moziPath = bfsPath(moziPos, moziGoal, hWalls, vWalls, lubanPos);
  const pathSet = new Set();
  if (moziPath) moziPath.forEach(p => pathSet.add(`${p.r}_${p.c}`));

  // Try walls near mozi's path
  const candidates = [];
  for (let r = 0; r < ROWS-1; r++) {
    for (let c = 0; c < COLS-1; c++) {
      // Prioritize walls near mozi's path
      const priority = pathSet.has(`${r}_${c}`) || pathSet.has(`${r+1}_${c}`) || pathSet.has(`${r}_${c+1}`) ? 2 : 1;
      candidates.push({ type:'h', r, c, priority });
      candidates.push({ type:'v', r, c, priority });
    }
  }
  candidates.sort((a,b) => b.priority - a.priority);

  // Evaluate top candidates
  for (const { type, r, c } of candidates.slice(0, 80)) {
    if (!isWallValid(type, r, c)) continue;
    const testH = new Set(hWalls);
    const testV = new Set(vWalls);
    if (type === 'h') testH.add(wallKey('h',r,c));
    else testV.add(wallKey('v',r,c));
    const newMoziDist = bfsDistance(moziPos, moziGoal, testH, testV, lubanPos);
    const newLubanDist = bfsDistance(lubanPos, lubanGoal, testH, testV, moziPos);
    if (newLubanDist === Infinity) continue; // don't block ourselves
    const gain = newMoziDist - moziBaseDist;
    if (gain > bestGain) { bestGain = gain; best = { type, r, c }; }
  }
  return best;
}
